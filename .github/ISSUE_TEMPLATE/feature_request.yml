name: Feature request
description: Suggest a batteryDrainTest improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What battery-testing or monitoring task is difficult today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior and the affected mode or component.
    validations:
      required: true

  - type: textarea
    id: safety
    attributes:
      label: Safety considerations
      description: Note thermal or battery-health implications, resource usage, or platform-specific behavior.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe other approaches or workarounds you considered.
